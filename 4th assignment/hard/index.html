<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 4 - Hard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/a670c88198.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main id="container">
      <div class="nav">
        <div class="logo">
          <p>Deep<span>o</span>style</p>
        </div>
        <div class="menu">
          <ul>
            <li>New Arrivals</li>
            <li>Shop</li>
            <li>Beauty</li>
            <li>Sale</li>
            <li>Journal</li>
          </ul>
        </div>
        <div class="icon">
          <div class="search"><i class="ri-search-line"></i></div>
          <div class="hexagon"><i class="ri-hexagon-line"></i></div>
          <div class="shopping_cart"><i class="ri-shopping-cart-line"></i></div>
        </div>
      </div>
      <hr />

      <div class="hero">
        <div class="left_hero">
          <div class="top_left_hero">
            <img
              src="./images/flower1.png"
              alt="yellow flower"
              height="100"
              width="100"
            />
          </div>

          <div class="bottom_left_hero">
            <span>Summer collection</span>
            <p>Trandy and <br />clussi for <br />new season.</p>
          </div>
        </div>
        <div class="center_hero">
          <p class="heading1">Make your fashion look</p>
          <p class="heading2">more charming</p>
        </div>
        <div class="right_hero">
          <div class="top_right_hero">
            <img
              src="./images/flower5.png"
              alt="red flower"
              height="60"
              width="60"
            />
          </div>

          <div class="bottom_right_hero">
            <img
              src="./images/oldring.png"
              alt="explore pic"
              alt="oldring"
              height="200"
              width="200"
            />
          </div>
        </div>
      </div>
      <div class="stack_cards">
        <div class="card1"></div>
        <div class="card2">
          <div class="top_card_2"></div>
          <div class="bottom_card_2"></div>
        </div>
        <div class="card3"></div>
        <div class="card4">
          <div class="top_card_4"></div>
          <div class="bottom_card_4"></div>
        </div>
        <div class="card5"></div>
      </div>
    </main>
  </body>
</html>
