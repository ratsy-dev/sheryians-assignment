<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 4 - Medium</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/a670c88198.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="container">
      <div class="card card1">
        <div class="profile_start">
          <img src="./images/img1.jpeg" alt="img1" height="20" width="20" />
          <div class="inner-profile">
            <p>Hi, I'm Jane</p>
            <span>Designer</span>
          </div>
        </div>
        <div class="profile_desc">
          <p>
            Designing with purpose, innovating <br />
            with passion.
          </p>
        </div>
        <div class="profile_end">
          <p>
            I constantly explore new tools and technique to design
            <br />impactful and user-friendly digital solutions.
          </p>
        </div>
      </div>
      <div class="card card2"></div>
      <div class="card card3"></div>
      <div class="card card4">
        <div class="icon icon1">
          <i class="ri-facebook-circle-fill"></i>
        </div>
        <div class="icon icon2">
          <i class="ri-twitter-x-line"></i>
        </div>
        <div class="icon icon3">
          <i class="ri-instagram-line"></i>
        </div>
        <div class="icon icon4">
          <i class="ri-linkedin-box-fill"></i>
        </div>
        <div class="icon icon5">
          <i class="ri-dribbble-line"></i>
        </div>
        <div class="icon icon6">
          <i class="ri-behance-line"></i>
        </div>
      </div>
      <div class="card card5">
        <div class="top">
          <p>Resources</p>
          <p class="para">
            Resources to Speed <br />
            your workflow.
          </p>
        </div>
        <div class="bottom">
          <i class="ri-arrow-right-up-line"></i>
        </div>
      </div>
      <div class="card card6">6</div>
      <div class="card card7">7</div>
      <div class="card card8">8</div>
      <div class="card card9">9</div>
      <div class="card card10">10</div>
      <div class="card card11">11</div>
    </div>
  </body>
</html>
