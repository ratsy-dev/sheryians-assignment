<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-2-Easy</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <div class="nav">
        <div class="logo">
          <img src="./images/logo.png" alt="logo" height="40" width="40" />
          <span>ScaleX</span>
        </div>
        <div class="menu">
          <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Blogs</li>
            <li>Contact Us</li>
          </ul>
        </div>
        <div class="btn">
          <button>Get Started</button>
        </div>
      </div>
      <div class="title">
        <p>Insights & Blogs</p>
      </div>
      <div class="filter">
        <div class="div1">
          <p>All</p>
        </div>
        <div class="div2">
          <p>Tech</p>
        </div>
        <div class="div3">
          <p>SaaS</p>
        </div>
        <div class="div4">
          <p>Marketing</p>
        </div>
      </div>
      <div class="cards">
        <div class="card">
          <div class="img">
            <img src="./images/glass.png" alt="glass_logo" />
          </div>
          <div class="chips">
            <span>Tech</span>
          </div>
          <div class="text">
            <p>The ultimate guide to SaaS marketing.</p>
          </div>
          <div class="date">
            <p>May 23, 2025</p>
          </div>
        </div>
        <div class="card">
          <div class="img">
            <img src="./images/chair.png" alt="chair_logo" />
          </div>
          <div class="chips">
            <span>SaaS</span>
          </div>
          <div class="text">
            <p>5 key trends in SaaS growth for 2025.</p>
          </div>
          <div class="date">
            <p>May 23, 2025</p>
          </div>
        </div>
        <div class="card">
          <div class="img">
            <img src="./images/cat.png" alt="cat_logo" />
          </div>
          <div class="chips">
            <span>Marketing</span>
          </div>
          <div class="text">
            <p>How data-driven strategies are important.</p>
          </div>
          <div class="date">
            <p>May 23, 2025</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
